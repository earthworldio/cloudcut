services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: cloudcut
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d cloudcut"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: 501588780040.dkr.ecr.ap-southeast-2.amazonaws.com/cloudcut-api:latest
    build:
      context: .
      dockerfile: backend/Dockerfile.api
    restart: always
    environment:
      DATABASE_URL: postgres://user:password@db:5432/cloudcut
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"

  worker:
    image: 501588780040.dkr.ecr.ap-southeast-2.amazonaws.com/cloudcut-worker:latest
    build:
      context: .
      dockerfile: backend/Dockerfile.worker
    restart: always
    environment:
      DATABASE_URL: postgres://user:password@db:5432/cloudcut
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: 501588780040.dkr.ecr.ap-southeast-2.amazonaws.com/cloudcut-frontend:latest
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: always
    ports:
      - "80:80"
    environment:
      VITE_API_URL: ${VITE_API_URL}

volumes:
  postgres_data:
