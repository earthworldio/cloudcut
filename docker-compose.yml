services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: cloudcut
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d cloudcut"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: always
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-admin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-password123}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-admin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-password123}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-cloudcut-assets}
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 $$S3_ACCESS_KEY $$S3_SECRET_KEY &&
        mc mb --ignore-existing local/$$S3_BUCKET_NAME &&
        mc anonymous set download local/$$S3_BUCKET_NAME
      "

  api:
    image: 501588780040.dkr.ecr.ap-southeast-2.amazonaws.com/cloudcut-api:${TAG:-latest}
    build:
      context: .
      dockerfile: backend/Dockerfile.api
    restart: always
    environment:
      DATABASE_URL: postgres://user:password@db:5432/cloudcut
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-admin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-password123}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-cloudcut-assets}
      JWT_SECRET: ${JWT_SECRET:-secret}
      FRONTEND_URL: https://${HOST:-localhost}
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY:-admin}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY:-password123}
      AWS_ENDPOINT_URL: https://${HOST:-localhost}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker:
    image: 501588780040.dkr.ecr.ap-southeast-2.amazonaws.com/cloudcut-worker:${TAG:-latest}
    build:
      context: .
      dockerfile: backend/Dockerfile.worker
    restart: always
    environment:
      DATABASE_URL: postgres://user:password@db:5432/cloudcut
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-admin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-password123}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-cloudcut-assets}
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY:-admin}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY:-password123}
      AWS_ENDPOINT_URL: http://minio:9000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  frontend:
    image: 501588780040.dkr.ecr.ap-southeast-2.amazonaws.com/cloudcut-frontend:${TAG:-latest}
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    restart: always

  caddy:
    image: caddy:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      HOST: ${HOST:-localhost}
    depends_on:
      - api
      - frontend

volumes:
  postgres_data:
  minio_data:
  caddy_data:
  caddy_config:
